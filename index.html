<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Choix du portfolio</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="selection-shell">
      <section class="hero">
        <h1>Choisissez une version du portfolio</h1>
        <p class="hero-text">
          Les deux versions présentent le même univers, avec une approche
          visuelle différente.
        </p>
      </section>

      <section class="buttons" aria-label="Choix de version du portfolio">
        <button
          id="btn-v1"
          class="nav-card nav-card--immersive"
          type="button"
          aria-label="Ouvrir le portfolio version 1"
        >
          <span
            class="nav-card__preview nav-card__preview--immersive"
            aria-hidden="true"
          >
            <img
              class="nav-card__image"
              src="./portfolio1.webp"
              alt=""
              loading="lazy"
            />
          </span>

          <span class="nav-card__content">
            <span class="nav-card__title">
              Portfolio <span class="nav-card__version">V1</span>
            </span>
          </span>

          <span class="nav-card__meta">
            <span>HTML</span>
            <span>CSS</span>
            <span>JS</span>
          </span>
        </button>

        <button
          id="btn-v2"
          class="nav-card nav-card--clean"
          type="button"
          aria-label="Ouvrir le portfolio version 2"
        >
          <span
            class="nav-card__preview nav-card__preview--clean"
            aria-hidden="true"
          >
            <img
              class="nav-card__image"
              src="./portfolio2.webp"
              alt=""
              loading="lazy"
            />
          </span>

          <span class="nav-card__content">
            <span class="nav-card__title">
              Portfolio <span class="nav-card__version">V2</span>
            </span>
          </span>

          <span class="nav-card__meta">
            <span>React</span>
            <span>Next.js</span>
          </span>
        </button>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>

<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Choix du portfolio</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="selection-shell">
      <section class="hero">
        <h1>Choisissez une version du portfolio</h1>
      </section>

      <section class="buttons" aria-label="Choix de version du portfolio">
        <button
          id="btn-v1"
          class="nav-card nav-card--immersive"
          type="button"
          aria-label="Ouvrir le portfolio version 1"
        >
          <span
            class="nav-card__preview nav-card__preview--immersive"
            aria-hidden="true"
          >
            <img
              class="nav-card__image"
              src="./portfolio1.webp"
              alt=""
              loading="lazy"
            />
          </span>

          <span class="nav-card__content">
            <span class="nav-card__title">
              Portfolio <span class="nav-card__version">V1</span>
            </span>
          </span>

          <span class="nav-card__meta">
            <span>HTML</span>
            <span>CSS</span>
            <span>JS</span>
          </span>
        </button>

        <button
          id="btn-v2"
          class="nav-card nav-card--clean"
          type="button"
          aria-label="Ouvrir le portfolio version 2"
        >
          <span
            class="nav-card__preview nav-card__preview--clean"
            aria-hidden="true"
          >
            <img
              class="nav-card__image"
              src="./portfolio2.webp"
              alt=""
              loading="lazy"
            />
          </span>

          <span class="nav-card__content">
            <span class="nav-card__title">
              Portfolio <span class="nav-card__version">V2</span>
            </span>
          </span>

          <span class="nav-card__meta">
            <span>React</span>
            <span>Next.js</span>
          </span>
        </button>
      </section>

      <footer class="page-footer">
        <a
          class="github-link"
          href="https://github.com/baku67"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="Ouvrir le compte GitHub de Basile"
        >
          <svg
            class="github-link__icon"
            viewBox="0 0 24 24"
            aria-hidden="true"
            focusable="false"
          >
            <path
              fill="currentColor"
              d="M12 2C6.477 2 2 6.589 2 12.248c0 4.526 2.865 8.366 6.839 9.72.5.096.682-.222.682-.494 0-.244-.009-.89-.014-1.747-2.782.62-3.369-1.37-3.369-1.37-.455-1.18-1.11-1.495-1.11-1.495-.908-.636.069-.623.069-.623 1.004.072 1.532 1.055 1.532 1.055.892 1.565 2.341 1.113 2.91.851.091-.664.349-1.114.635-1.37-2.221-.259-4.555-1.14-4.555-5.072 0-1.12.39-2.036 1.029-2.753-.103-.26-.446-1.307.097-2.725 0 0 .84-.276 2.75 1.051A9.303 9.303 0 0 1 12 6.836a9.27 9.27 0 0 1 2.505.348c1.909-1.327 2.747-1.051 2.747-1.051.545 1.418.202 2.465.1 2.725.64.717 1.027 1.633 1.027 2.753 0 3.942-2.338 4.81-4.566 5.064.359.318.679.946.679 1.907 0 1.377-.012 2.487-.012 2.826 0 .274.18.594.688.493C19.138 20.61 22 16.772 22 12.248 22 6.589 17.523 2 12 2Z"
            />
          </svg>

          <span>Voir mon GitHub</span>
        </a>
      </footer>
    </main>

    <script src="script.js"></script>
  </body>
</html>
